  #   restart: always
  #   environment:
  #     MYSQL_ROOT_PASSWORD: admin
  #   ports:
  #   - "3306:3306" 
  #   volumes:
  #   - ./mysql-dump:/docker-entrypoint-initdb.d
  #   #- ./mysql-data:/var/lib/mysql


  # adminer:
  #   image: adminer
  #   container_name: se4iot-mysql-adminer
  #   restart: always
  #   ports:
  #     - "8080:8080"
  #   networks:
  #     - se4iot-net

  node-red:
    container_name: node-red
    build:
      context: ./nodered/
      dockerfile: Dockerfile
    image: nodered/node-red:latest
    environment:
      - TZ=Europe/Rome
      # - MYSQLUSERNAME=root
      # - MYSQLPASSWORD=example
      - MQTT_USERNAME=${IOT_USERNAME}
      - MQTT_PASSWORD=${IOT_PASSWORD}
      - INFLUX_TOKEN=${INFLUX_TOKEN}
    ports:
      - "1880:1880"
    networks:
      smart-bus-system-network:
        ipv4_address: 20.0.0.30
    volumes:
      - ./nodered/data:/data
      - ./config.json:/system_data/config.json


  

  influxdb:
    container_name: smart-bus-system-influxdb
    image: influxdb:2.7.4
    ports:
      - 8086:8086
    volumes:
      - ./influxdb/data:/var/lib/influxdb2
      - ./influxdb/config:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${IOT_USERNAME}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${IOT_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=univaq
      - DOCKER_INFLUXDB_INIT_BUCKET=smart-bus-system
      - DOCKER_INFLUXDB_INIT_RETENTION=1w
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUX_TOKEN}
    networks:
      smart-bus-system-network:
        ipv4_address: 20.0.0.40


