# Use root/example as user/password credentials
configs:
  system_config:
    file: ./config.json
  
# volumes:
#   smart-bus-volume:
#   driver: local 
#   driver_opts: 
#     o: 
#       bind type: none
#       device: /path/to/files/on/host


networks:
  smart-bus-system-network:
    driver: bridge
    ipam:
      config:
        - subnet: 20.0.0.0/8


services:

  sensors:
    build: ./sensors
    volumes:
      - ./config.json:/config.json
    environment:
      - IOT_USERNAME=${IOT_USERNAME}
      - IOT_PASSWORD=${IOT_PASSWORD}
    container_name: smart-bus-system-sensors
    networks:
      smart-bus-system-network:
        ipv4_address: 20.0.0.10

  mosquitto:
    container_name: smart-bus-system-mosquitto
    # image: giacomix02/iot_mosquitto:v1
    build:
      context: ./mosquitto
      args:
        - IOT_USERNAME=${IOT_USERNAME}
        - IOT_PASSWORD=${IOT_PASSWORD}
    environment:
      - IOT_USERNAME=${IOT_USERNAME}
      - IOT_PASSWORD=${IOT_PASSWORD}
    volumes:
    # - ./mosquitto/config/mosquitto.passwd:/mosquitto/config/mosquitto.passwd
    - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
    - ./mosquitto/log:/mosquitto/log
    - ./mosquitto/data/:/mosquitto/data
    restart: always
    networks:
      smart-bus-system-network:
        ipv4_address: 20.0.0.20
    ports:
      - 1883:1883

  
  # db:
  #   image: mysql
  #   container_name: se4iot-mysql
  #   # NOTE: use of "mysql_native_password" is not recommended: https://dev.mysql.com/doc/refman/8.0/en/upgrading-from-previous-series.html#upgrade-caching-sha2-password
